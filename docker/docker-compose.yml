services:
  db:
    image: postgres:15-alpine
    container_name: keyguard-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keyguard
    ports:
      - "127.0.0.1:5432:5432" # Bind it to 127.0.0.1
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: keyguard-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379" # Bind it to 127.0.0.1
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
# Bind them to 127.0.0.1 because we never know someone might access these even in production
# environment. Also try to check out networks in docker, either bind to 127.0.0.1 or dont
# bind and keep it within the network